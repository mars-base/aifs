name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # ── CLI: cross-compile all platforms from a single Linux runner ──────────
  build-cli:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build all CLI binaries
        env:
          CGO_ENABLED: 0
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          BUILD_TIME="$(date -u '+%Y-%m-%d_%H:%M:%S')"
          LDFLAGS="-X main.version=${VERSION} -X main.buildTime=${BUILD_TIME}"

          targets=(
            "linux/amd64"
            "linux/arm64"
            "darwin/amd64"
            "darwin/arm64"
            "windows/amd64"
          )

          for target in "${targets[@]}"; do
            GOOS="${target%/*}"
            GOARCH="${target#*/}"
            EXT=""
            [ "$GOOS" = "windows" ] && EXT=".exe"
            BINARY="aifs-${GOOS}-${GOARCH}${EXT}"
            echo "→ Building ${BINARY}..."
            GOOS="${GOOS}" GOARCH="${GOARCH}" \
              go build -ldflags "${LDFLAGS}" -o "${BINARY}" ./cmd/aifs
          done

          echo "→ Build complete. Artifacts:"
          ls -lh aifs-*

      - name: Upload CLI artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cli-binaries
          path: |
            aifs-linux-amd64
            aifs-linux-arm64
            aifs-darwin-amd64
            aifs-darwin-arm64
            aifs-windows-amd64.exe

  # ── GUI: must build on each native platform ──────────────────────────────
  build-gui:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            name: linux-amd64
            output: aifs-gui-linux-amd64
          - os: macos-latest   # GitHub provides macos-latest as arm64 (M-series)
            name: darwin-arm64
            output: aifs-gui-darwin-arm64
          - os: macos-13       # Last Intel macOS runner
            name: darwin-amd64
            output: aifs-gui-darwin-amd64
          - os: windows-latest
            name: windows-amd64
            output: aifs-gui-windows-amd64.exe
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: gui/frontend/package-lock.json

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install Linux WebKit dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          # Ubuntu 24.04+ uses webkit2gtk-4.1; fall back to 4.0 for older runners.
          # Wails' cgo pkg-config name depends on the 'webkit2_41' build tag, so
          # record which ABI we actually installed for the Build GUI step.
          if sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev; then
            echo "WAILS_TAGS=webkit2_41" >> "$GITHUB_ENV"
          else
            sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev
            echo "WAILS_TAGS=" >> "$GITHUB_ENV"
          fi

      - name: Install WinFsp (Windows)
        if: runner.os == 'Windows'
        run: |
          $headers = @{ Authorization = "token ${{ secrets.GITHUB_TOKEN }}" }
          $releases = Invoke-WebRequest https://api.github.com/repos/winfsp/winfsp/releases -Headers $headers | ConvertFrom-Json
          $asseturi = $releases[0].assets.browser_download_url | Where-Object { $_ -match "winfsp-.*\.msi" }
          Invoke-WebRequest -Uri $asseturi -Out winfsp.msi
          Start-Process -NoNewWindow -Wait msiexec "/i winfsp.msi /qn INSTALLLEVEL=1000"

          # internal/pgfs's Windows build (github.com/winfsp/cgofuse/fuse) compiles
          # via cgo on Windows and needs the FUSE-compatible headers WinFsp expects
          # under inc/fuse — the installer only ships the DLL/import libs, not these.
          mkdir "C:\WinFsp\inc\fuse"
          copy .\hack\winfsp_headers\* C:\WinFsp\inc\fuse\
          go env -w CGO_CFLAGS=-IC:/WinFsp/inc/fuse

      - name: Install frontend dependencies
        run: cd gui/frontend && npm ci

      - name: Build GUI
        run: cd gui && wails build -tags "${{ env.WAILS_TAGS }}"

      - name: Collect artifact (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          if [ -f gui/build/bin/aifs-gui ]; then
            cp gui/build/bin/aifs-gui ${{ matrix.output }}
          else
            cp gui/build/bin/aifs-gui.app/Contents/MacOS/aifs-gui ${{ matrix.output }}
          fi

      - name: Collect artifact (Windows)
        if: runner.os == 'Windows'
        run: copy gui\build\bin\aifs-gui.exe ${{ matrix.output }}

      - name: Upload GUI artifact
        uses: actions/upload-artifact@v4
        with:
          name: gui-${{ matrix.name }}
          path: ${{ matrix.output }}

  # ── Release: gather all artifacts and publish ────────────────────────────
  release:
    needs: [build-cli, build-gui]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: List artifacts
        run: ls -lh

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            aifs-linux-amd64
            aifs-linux-arm64
            aifs-darwin-amd64
            aifs-darwin-arm64
            aifs-windows-amd64.exe
            aifs-gui-linux-amd64
            aifs-gui-darwin-amd64
            aifs-gui-darwin-arm64
            aifs-gui-windows-amd64.exe
          generate_release_notes: true
